<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
:root{--bg:#e9fbf8;--deep:#163e72;--green:#35b86b;--yellow:#f3b733;--red:#e54b4b;--blue:#4ba9ee;--ink:#17314f;--card:#fff;--soft:#f5fbff;--shadow:0 18px 45px rgba(20,70,120,.16);--radius:28px}
html,body{min-height:100%;font-family:Tajawal,system-ui,sans-serif;background:linear-gradient(180deg,#dff8ff 0%,#ecfff2 100%);color:var(--ink);overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:18px 14px 28px;align-items:center;justify-content:center}.screen.active{display:flex}.app{width:min(520px,100%);margin:auto}.card{background:rgba(255,255,255,.94);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;border:6px solid rgba(255,255,255,.8)}
.hero{background:linear-gradient(145deg,#14528f,#0e8b57);color:#fff;text-align:center}.star{font-size:58px;display:inline-block;filter:drop-shadow(0 8px 12px rgba(0,0,0,.18));animation:bob 1.8s ease-in-out infinite}.title{font-size:clamp(28px,8vw,42px);font-weight:900;line-height:1.2;margin:8px 0}.sub{font-size:clamp(16px,4.6vw,20px);font-weight:800;opacity:.92;line-height:1.55}.codeInput{width:100%;margin:22px 0 12px;padding:18px 20px;border-radius:24px;border:4px solid #d5eefb;background:#fff;font-size:30px;font-weight:900;text-align:center;color:#17314f;font-family:Tajawal}.bigBtn{width:100%;border:none;border-radius:999px;background:linear-gradient(135deg,#ffd641,#f5a400);color:#3b2100;font-family:Tajawal;font-weight:900;font-size:28px;padding:18px 26px;box-shadow:0 12px 28px rgba(230,160,0,.28);cursor:pointer}.bigBtn:active{transform:scale(.96)}.smallHint{font-size:13px;font-weight:800;opacity:.78;line-height:1.5;margin-top:10px}.codeError{display:none;margin-top:12px;background:#fff1f1;border:4px solid #e54b4b;color:#b51616;border-radius:22px;padding:12px 14px;font-size:24px;font-weight:900;text-align:center;box-shadow:0 8px 20px rgba(229,75,75,.18)}.codeError.show{display:block;animation:shakeCode .35s ease}.startSoftDisabled{opacity:.55;filter:grayscale(.25)}@keyframes shakeCode{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}.topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px}.pill{background:#fff;border-radius:999px;padding:8px 14px;font-weight:900;box-shadow:0 4px 12px rgba(30,90,130,.08);font-size:14px}.progressWrap{flex:1;height:18px;background:#d7edf5;border-radius:999px;overflow:hidden;border:3px solid #fff;box-shadow:inset 0 2px 8px rgba(0,0,0,.08)}.progressFill{height:100%;width:0;background:linear-gradient(90deg,#35b86b,#ffd641);border-radius:999px;transition:width .45s cubic-bezier(.2,.9,.2,1)}
.videoBox{background:#fff;border-radius:26px;box-shadow:var(--shadow);padding:12px;position:relative}.videoBox video{width:100%;border-radius:20px;background:#111;display:block;max-height:70vh}.videoOverlay{position:absolute;inset:12px;border-radius:20px;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:4;transition:opacity .25s ease,visibility .25s ease}.videoOverlay.hide{opacity:0;visibility:hidden;pointer-events:none}.bigPlay{width:96px;height:96px;border-radius:50%;border:7px solid rgba(255,255,255,.94);background:linear-gradient(135deg,#ffcf38,#ff9f0a);box-shadow:0 12px 32px rgba(0,0,0,.28),0 0 0 10px rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:50px;color:#143d6c;line-height:1;padding-right:4px;animation:playPulse 1.3s ease-in-out infinite}.bigPlay:active{transform:scale(.92)}@keyframes playPulse{0%,100%{box-shadow:0 12px 32px rgba(0,0,0,.28),0 0 0 10px rgba(255,255,255,.15)}50%{box-shadow:0 16px 38px rgba(0,0,0,.32),0 0 0 20px rgba(255,255,255,.20)}}.videoMsg{text-align:center;font-weight:900;font-size:20px;margin:14px 0;color:#1c4c7b}.playGate{margin-top:12px}.disabled{opacity:.45;pointer-events:none;filter:grayscale(.4)}
.gameTitle{text-align:center;font-size:clamp(22px,6vw,32px);font-weight:900;color:#164672;line-height:1.2;margin:4px 0 2px}.gameSub{text-align:center;font-size:15px;font-weight:800;color:#5e7c98;margin-bottom:10px}.bodyStage{position:relative;background:linear-gradient(180deg,#fff 0%,#f8fdff 100%);border-radius:30px;box-shadow:var(--shadow);padding:10px 6px 4px;overflow:hidden}.bodySvg{width:100%;max-width:285px;margin:0 auto;display:block;overflow:visible}.partShape{fill:transparent;stroke:transparent;stroke-width:0;pointer-events:none}.partShape.active{stroke:#ffd12e;stroke-width:5;fill:rgba(255,209,46,.28);filter:drop-shadow(0 0 16px rgba(255,209,46,.95));animation:pulse 1s ease-in-out infinite}.partShape.teach{stroke:#2d7ff9;stroke-width:5;fill:rgba(45,127,249,.18);filter:drop-shadow(0 0 14px rgba(45,127,249,.55));animation:pulse .9s ease-in-out infinite}.feedbackOverlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transform:scale(.92);transition:.22s}.feedbackOverlay.show{opacity:1;transform:scale(1)}.feedbackBubble{min-width:190px;min-height:140px;border-radius:34px;background:rgba(255,255,255,.96);box-shadow:0 20px 55px rgba(0,0,0,.20);border:8px solid #35b86b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.feedbackBubble.protect{border-color:#e54b4b}.feedbackBubble.demo{border-color:#35b86b}.feedbackIcon{font-size:72px;line-height:1}.feedbackMini{font-size:40px;line-height:1}
.guide{position:absolute;left:-8px;bottom:6px;width:118px;height:158px;transform-origin:bottom center;transition:.25s;pointer-events:none}.guide svg{width:100%;height:100%;overflow:visible}.guide.happy{animation:guideBounce .48s ease}.guide.protect{animation:guideStep .55s ease}.guideHandNo{opacity:0;transform-origin:26px 42px}.guide.protect .guideHandNo{opacity:1;animation:noWave .52s ease-in-out 2}.guideThumb{opacity:0}.guide.happy .guideThumb{opacity:1}.faceMouth{transition:.2s}.guide.happy .faceMouth{d:path('M31 38 Q42 50 53 38')}.guide.protect .faceMouth{d:path('M31 46 Q42 38 53 46')}
.answers{display:flex;gap:12px;justify-content:center;margin:14px 0}.answerBtn{flex:1;max-width:132px;aspect-ratio:1/1;border-radius:28px;border:6px solid #fff;background:#fff;font-size:56px;box-shadow:0 10px 24px rgba(20,70,120,.14);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}.answerBtn:active{transform:scale(.92)}.answerBtn.pulseCorrect{animation:correctPulse .7s ease 2;border-color:#35b86b;background:#e5faee}.answerBtn.yes{border-color:#35b86b;background:#e9fbef;color:#0f8c45}.answerBtn.no{border-color:#e54b4b;background:#fff0f0;color:#d62828}.answerBtn.pulseCorrect{animation:correctPulse .7s ease 2;border-color:#35b86b!important;background:#e5faee!important}.doneCard{text-align:center}.doneIcon{font-size:80px;animation:bob 1.4s ease-in-out infinite}.logNote{display:none!important}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes pulse{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.04);opacity:1}}@keyframes guideBounce{0%,100%{transform:translateY(0)}45%{transform:translateY(-10px)}}@keyframes guideStep{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}@keyframes noWave{0%,100%{transform:rotate(0)}50%{transform:rotate(-18deg)}}@keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.reviewMap{margin:18px 0}.reviewVideo{position:relative;width:100%;border-radius:28px;overflow:hidden;background:#fff;box-shadow:0 12px 32px rgba(20,70,120,.14);border:6px solid #eef8ff}.reviewVideo img{width:100%;display:block}.reviewBodySvg{width:100%;max-width:330px;margin:0 auto;display:block;overflow:visible}.reviewPartShape{fill:transparent;stroke:transparent;stroke-width:0;pointer-events:none}.reviewPartShape.teach{stroke:#ffd12e;stroke-width:5;fill:rgba(255,209,46,.24);filter:drop-shadow(0 0 14px rgba(255,209,46,.85));animation:pulse .9s ease-in-out infinite}.reviewSpot{position:absolute;width:42px;height:42px;border-radius:50%;border:4px solid #ffd12e;background:rgba(255,209,46,.16);box-shadow:0 0 0 5px rgba(255,209,46,.10),0 0 12px rgba(255,209,46,.75);transform:translate(-50%,-50%) scale(.6);opacity:0;transition:.35s;animation:pulse .9s ease-in-out infinite}.reviewSpot.show{opacity:1;transform:translate(-50%,-50%) scale(1)}.reviewMarkBig{position:absolute;font-size:42px;line-height:1;transform:translate(-50%,-50%) scale(.55);opacity:0;text-shadow:0 4px 10px rgba(0,0,0,.14);transition:.35s}.reviewMarkBig.show{opacity:1;transform:translate(-50%,-50%) scale(1)}.reviewFinalMark{position:absolute;font-size:30px;line-height:1;transform:translate(-50%,-50%);text-shadow:0 3px 8px rgba(0,0,0,.12);z-index:5;pointer-events:none}.reviewFinalMark.check{filter:drop-shadow(0 4px 8px rgba(20,180,70,.28))}.reviewFinalMark.x{filter:drop-shadow(0 4px 8px rgba(220,40,40,.22))}.playAgainHidden{opacity:.35;pointer-events:none;filter:grayscale(.4)}.handComfortCue{position:absolute;right:12px;top:62px;background:#e5faee;border:6px solid #35b86b;border-radius:30px;padding:10px 18px;font-size:54px;box-shadow:0 12px 28px rgba(53,184,107,.28);opacity:0;transform:scale(.8);transition:.22s;pointer-events:none}.handComfortCue.show{opacity:1;transform:scale(1);animation:correctPulse .7s ease 2}
@media (max-width:420px){.card{padding:18px}.answerBtn{font-size:48px;border-radius:22px}.guide{width:82px;height:118px}.bodySvg{max-width:250px}.feedbackBubble{min-width:160px;min-height:120px}.feedbackIcon{font-size:60px}}
</style>
</head>

function videoStats(){
  const dur = video && video.duration ? video.duration : 0;
  const cur = video ? (video.currentTime || 0) : 0;
  const pct = dur ? Math.max(0, Math.min(100, Math.round((cur / dur) * 100))) : 0;
  return {seconds: Math.round(cur), percent: pct};
}
function updateMaxVideoProgress(){
  const st = videoStats();
  // IMPORTANT: only move upward. Rewinding/replaying must never reduce the logged percentage.
  if(st.percent > maxVideoPercentWatched){
    maxVideoPercentWatched = st.percent;
    maxVideoSecondsWatched = st.seconds;
  }
  if(videoProgress) videoProgress.style.width = maxVideoPercentWatched + '%';
  return {seconds:maxVideoSecondsWatched, percent:maxVideoPercentWatched, currentSeconds:st.seconds, currentPercent:st.percent};
}
function logVideoProgress(force){
  if(!video || !sessionId) return;
  const st = updateMaxVideoProgress();
  const now = Date.now();
  // Log the highest percentage reached, never the lower current position after rewind/replay.
  if(force || st.percent >= lastVideoProgressPct + 5 || now - lastVideoProgressMs > 8000){
    lastVideoProgressPct = st.percent;
    lastVideoProgressMs = now;
    log('video_progress',{watched_seconds:st.seconds,watched_percent:st.percent});
  }
}

    {key:'arm_l', mark:'❌', x:24, y:60, kind:'x', ids:['review-part-arm-l']},
    {key:'arm_r', mark:'❌', x:76, y:60, kind:'x', ids:['review-part-arm-r']},
    {key:'chest', mark:'❌', x:50, y:47, kind:'x', ids:['review-part-chest']},
    {key:'stomach', mark:'❌', x:50, y:59, kind:'x', ids:['review-part-stomach']},
    {key:'private_area', mark:'❌', x:50, y:72, kind:'x', ids:['review-part-private']}
  ];

  function setSpotStyle(kind){
    if(!reviewSpot) return;
    if(kind==='check'){
      reviewSpot.style.borderColor='#32c267';
      reviewSpot.style.borderWidth='4px';
      reviewSpot.style.background='rgba(50,194,103,.16)';
      reviewSpot.style.boxShadow='0 0 0 5px rgba(50,194,103,.12),0 0 12px rgba(50,194,103,.75)';
    }else{
      reviewSpot.style.borderColor='#ff3b30';
      reviewSpot.style.borderWidth='4px';
      reviewSpot.style.background='rgba(255,59,48,.12)';
      reviewSpot.style.boxShadow='0 0 0 5px rgba(255,59,48,.09),0 0 12px rgba(255,59,48,.65)';
    }
  }

  function addFinalMark(step){
    if(!reviewVideo) return;
    // Safety guard: hands must never receive an X mark in the teaching map.
    if((step.key==='hand_l'||step.key==='hand_r') && step.mark==='❌') return;
    const m=document.createElement('div');
    m.className='reviewFinalMark '+(step.kind==='check'?'check':'x');
    m.textContent=step.mark;
    m.style.left=step.x+'%';
    m.style.top=step.y+'%';
    reviewVideo.appendChild(m);
  }

  let i=0;
  function step(){
    if(i>=teachingSteps.length){
      if(reviewSpot) reviewSpot.classList.remove('show');
      if(reviewMarkBig) reviewMarkBig.classList.remove('show');
      document.querySelectorAll('.reviewPartShape').forEach(el=>el.classList.remove('teach'));
      playAgainBtn.classList.remove('playAgainHidden');
      sound('ok');
      return;
    }
    const item=teachingSteps[i];
    document.querySelectorAll('.reviewPartShape').forEach(el=>el.classList.remove('teach'));
    (item.ids||[]).forEach(id=>{const el=document.getElementById(id); if(el) el.classList.add('teach');});
    setSpotStyle(item.kind);
    if(reviewSpot){
      reviewSpot.style.left=item.x+'%';
      reviewSpot.style.top=item.y+'%';
      reviewSpot.classList.add('show');
    }
    if(reviewMarkBig){
      reviewMarkBig.textContent=item.mark;
      reviewMarkBig.style.left=item.x+'%';
      reviewMarkBig.style.top=item.y+'%';
      reviewMarkBig.classList.add('show');
    }
    sound(item.kind==='check'?'ok':'protect');
    setTimeout(()=>{ addFinalMark(item); if(reviewMarkBig)reviewMarkBig.classList.remove('show'); },760);
    setTimeout(()=>{ i++; step(); },1100);
  }
  setTimeout(step,550);
}
function summarizeRound(r){
  const answers = r===1 ? firstRoundFirstAnswers : secondRoundFirstAnswers;
  let exact=0; bodyParts.forEach(p=>{ if(answers[p.key]===p.expected) exact++; });
  const score=Math.round((exact/bodyParts.length)*100);
  log('body_round_completed',{round:r,attempt_type:r===1?'pre':'post',first_try_exact_matches:exact,total_items:bodyParts.length,body_score:score,completed:true,total_seconds:Math.round((Date.now()-startedAt)/1000)});
  return {exact,score};
}
function finishGame(){
  bodyProgress.style.width='100%';
  if(round===1){
    preSummary=summarizeRound(1);
    renderReview();
    sound('ok');
    show('review');
    return;
  }
  const pre=preSummary||summarizeRound(1);
  const post=summarizeRound(2);
  log('body_game_completed',{pre_score:pre.score,post_score:post.score,improvement_points:post.score-pre.score,total_items:bodyParts.length,completed:true,total_seconds:Math.round((Date.now()-startedAt)/1000)});
  sound('ok'); videoProgress.style.width='0%'; videoCompleted=false; videoStartedLogged=false; lastVideoProgressPct=-1; lastVideoProgressMs=0; maxVideoPercentWatched=0; maxVideoSecondsWatched=0; setFinishLocked(true); if(video){ try{ video.currentTime=0; video.pause(); }catch(e){} } showVideoOverlay(true); show('video');
}
bind(playAgainBtn,()=>{
  round=2; bodyIndex=0; currentAttempts=0; bodyProgress.style.width='0%'; resetAnswerButtons(); clearParts();
  log('body_game_start',{round:round,attempt_type:'post'});
  show('game'); setTimeout(startPart,350);
});
})();
</script>
</body>
